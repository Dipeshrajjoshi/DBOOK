{% extends 'myapp/base.html' %}

{% block title %}Place Order{% endblock %}

{% block myhdg %}Place New Order{% endblock %}

{% block body_block %}

    <h2>Order Books</h2>
    <p>Select the books you want to order and choose whether to borrow or purchase.</p>

    <form action="{% url 'myapp:place_order' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Place Order" />
    </form>

{% endblock %}
